name: kidsbooks
description: Multilingual online children's bookshop with QPay payments and delivery.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  cloud_functions: ^5.0.4
  firebase_messaging: ^15.0.4
  firebase_remote_config: ^5.0.4

  # UI & utils
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.0

  # E-reader
  epub_view: ^3.2.0
  pdfx: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true # gen-l10n for the 7 ARB files in lib/l10n
  assets:
    - assets/images/
